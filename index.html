<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNT AI | Premium Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf2f8; 
            --accent: #fbcfe8; 
            --primary: #f472b6;
            --black: #1a1a1a; 
            --white: #ffffff;
            --brutal-shadow: 6px 6px 0px #1a1a1a;
            --btn-shadow: 4px 4px 0px #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(#f472b622 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        /* --- WRAPPER --- */
        .app-container {
            width: 100%;
            max-width: 480px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--white);
            border: 3px solid var(--black);
            box-shadow: var(--brutal-shadow);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- HEADER --- */
        .header {
            background: var(--primary);
            padding: 20px;
            border-bottom: 3px solid var(--black);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: -1px; color: var(--black); }
        .live-dot { height: 10px; width: 10px; background: #00ff00; border-radius: 50%; border: 2px solid var(--black); display: inline-block; margin-right: 5px; }

        /* --- FORMS --- */
        .content { padding: 25px; }
        
        .input-box {
            margin-bottom: 18px;
        }

        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; color: var(--black); opacity: 0.6; }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 3px solid var(--black);
            border-radius: 12px;
            font-weight: 600;
            outline: none;
            background: #fff;
            transition: 0.2s;
        }

        input:focus { background: var(--accent); box-shadow: 4px 4px 0px var(--black); }

        .btn {
            width: 100%;
            padding: 16px;
            border: 3px solid var(--black);
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: var(--btn-shadow);
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-main { background: var(--primary); color: var(--black); }
        .btn-sub { background: var(--accent); margin-bottom: 15px; }
        .btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px var(--black); }

        /* --- CHAT AREA --- */
        #chat-screen { display: none; }

        .chat-window {
            height: 450px;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 3px solid var(--black);
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border: 3px solid var(--black);
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 600;
        }

        .msg.self { 
            align-self: flex-end; 
            background: var(--primary); 
            border-bottom-right-radius: 2px;
            box-shadow: 4px 4px 0px var(--black);
        }

        .msg.received { 
            align-self: flex-start; 
            background: var(--white); 
            border-bottom-left-radius: 2px;
            box-shadow: -4px 4px 0px var(--black);
        }

        .chat-footer { padding: 15px; display: flex; gap: 10px; background: var(--white); }

        /* --- ANIMATIONS --- */
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .pop { animation: popIn 0.3s ease-out forwards; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="setup-screen" class="glass-card pop">
            <div class="header">
                <div class="logo">HUNT AI</div>
                <div style="font-size: 10px; font-weight: 800;"><span class="live-dot"></span>v2.0 Premium</div>
            </div>
            <div class="content">
                <div class="input-box">
                    <label>Identity</label>
                    <input type="text" id="username" placeholder="Who are you?">
                </div>
                
                <div class="input-box">
                    <label>Join Existing Room</label>
                    <input type="text" id="join-room-id" placeholder="Enter 6-digit code">
                </div>
                <button class="btn btn-sub" onclick="joinRoom()">Join Room</button>

                <div style="text-align: center; margin: 15px 0; font-weight: 900; font-size: 12px; opacity: 0.3;">OR CREATE NEW</div>

                <div class="input-box" style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Limit</label>
                        <input type="number" id="user-limit" value="2">
                    </div>
                    <div style="flex: 1;">
                        <label>Time (Sec)</label>
                        <input type="number" id="duration" value="60">
                    </div>
                </div>
                <button class="btn btn-main" onclick="createRoom()">Secure Room</button>
            </div>
        </div>

        <div id="chat-screen" class="glass-card pop">
            <div class="header">
                <div class="logo" id="display-room-id">ROOM #000000</div>
                <button onclick="location.reload()" style="background:none; border:none; cursor:pointer; font-weight:800; font-size:12px;">EXIT</button>
            </div>
            
            <div class="chat-window" id="chat-area">
                </div>

            <div class="chat-footer">
                <input type="text" id="msg-input" placeholder="Type a message..." style="margin-bottom: 0;">
                <button class="btn btn-main" style="width: 70px; margin-bottom: 0; box-shadow: 2px 2px 0px var(--black);" onclick="sendMsg()">></button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://huntai.onrender.com");
        
        let currentRoomId = null;
        let myName = "User";

        function createRoom() {
            myName = document.getElementById('username').value.trim() || "User";
            const limit = parseInt(document.getElementById('user-limit').value) || 2;
            const duration = parseInt(document.getElementById('duration').value) * 1000;
            const roomId = Math.floor(100000 + Math.random() * 900000).toString();
            
            socket.emit('create-room', { roomId, name: myName, limit, duration });
            setupToChat(roomId);
            addSystemMsg("Room ID: " + roomId);
        }

        function joinRoom() {
            myName = document.getElementById('username').value.trim() || "User";
            const roomId = document.getElementById('join-room-id').value.trim();
            if (!roomId) return alert("Room ID required");
            
            socket.emit('join-room', { roomId, name: myName });
            setupToChat(roomId);
        }

        function setupToChat(roomId) {
            currentRoomId = roomId;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('chat-screen').style.display = 'block';
            document.getElementById('display-room-id').innerText = "#" + roomId;
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (msg && currentRoomId) {
                socket.emit('message', { roomId: currentRoomId, msg: msg });
                addMessage(msg, true, myName);
                input.value = "";
            }
        }

        function addMessage(text, isSelf, sender) {
            const chatArea = document.getElementById('chat-area');
            const div = document.createElement('div');
            div.className = `msg ${isSelf ? 'self' : 'received'}`;
            div.innerHTML = `<div style="font-size:9px; opacity:0.6; margin-bottom:4px;">${sender}</div>${text}`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addSystemMsg(text) {
            const chatArea = document.getElementById('chat-area');
            const div = document.createElement('div');
            div.style.cssText = "text-align:center; font-size:10px; font-weight:800; color: #f472b6; margin: 10px 0;";
            div.innerText = "● SYSTEM: " + text;
            chatArea.appendChild(div);
        }

        // --- Socket Events ---
        socket.on('message', (msg) => addMessage(msg, false, "Friend"));
        socket.on('user-joined', () => addSystemMsg("New user joined!"));
        socket.on('expired', () => { alert("Expired!"); location.reload(); });
        socket.on('error-msg', (err) => { alert(err); location.reload(); });

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
