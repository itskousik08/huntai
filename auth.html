<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuntAI | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        [x-cloak] { display: none !important; }
        /* Floating Label Logic */
        .peer:placeholder-shown ~ .peer-placeholder-shown\:top-3\.5 { top: 0.875rem; }
        .peer:focus ~ .peer-focus\:-top-2, 
        .peer:not(:placeholder-shown) ~ .peer-focus\:-top-2 { top: -0.5rem; background-color: white; padding: 0 0.25rem; font-size: 0.75rem; color: #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-50 relative overflow-hidden" x-data="authApp()" x-init="init()" x-cloak>
    
    <!-- Background Animation -->
    <div class="bg-gradient-mesh"></div>

    <div class="w-full max-w-md p-8 bg-white rounded-3xl shadow-2xl relative z-10 fade-in-up border border-slate-100">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <img src="logo.png" alt="HuntAI Logo" class="h-16 w-auto mx-auto mb-6 object-contain drop-shadow-md">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight" x-text="isLogin ? 'Welcome Back' : 'Create Your Account'"></h1>
            <p class="text-slate-500 text-sm mt-2" x-text="isLogin ? 'Enter your credentials to access the dashboard.' : 'Start extracting premium leads in seconds.'"></p>
        </div>

        <!-- Toggle Switch -->
        <div class="flex bg-slate-100 p-1.5 rounded-xl mb-8 relative">
            <div class="absolute top-1.5 bottom-1.5 w-[calc(50%-6px)] bg-white rounded-lg shadow-sm transition-all duration-300 ease-out"
                 :class="isLogin ? 'left-1.5' : 'left-[calc(50%+3px)]'"></div>
            <button @click="isLogin = true; errorMsg=''" class="flex-1 py-2.5 text-sm font-bold relative z-10 transition-colors duration-200" 
                    :class="isLogin ? 'text-blue-600' : 'text-slate-500 hover:text-slate-700'">Sign In</button>
            <button @click="isLogin = false; errorMsg=''" class="flex-1 py-2.5 text-sm font-bold relative z-10 transition-colors duration-200"
                    :class="!isLogin ? 'text-blue-600' : 'text-slate-500 hover:text-slate-700'">New Account</button>
        </div>

        <!-- Error Message -->
        <div x-show="errorMsg" x-transition class="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 text-xs font-bold rounded-xl flex items-start gap-3">
            <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span x-text="errorMsg"></span>
        </div>

        <!-- Form -->
        <form @submit.prevent="handleSubmit" class="space-y-5">
            
            <!-- Signup Fields -->
            <div x-show="!isLogin" class="space-y-5" x-transition>
                
                <!-- Full Name -->
                <div class="relative">
                    <input type="text" id="fname" x-model="form.name" class="peer w-full border border-slate-300 rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-transparent transition bg-transparent" placeholder="Name">
                    <label for="fname" class="absolute left-4 top-[-0.5rem] bg-white px-1 text-xs text-slate-500 transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-slate-400 peer-placeholder-shown:text-sm peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600">Full Name <span class="text-red-500">*</span></label>
                </div>

                <!-- Business Name -->
                <div class="relative">
                    <input type="text" id="bname" x-model="form.business" class="peer w-full border border-slate-300 rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-transparent transition bg-transparent" placeholder="Business">
                    <label for="bname" class="absolute left-4 top-[-0.5rem] bg-white px-1 text-xs text-slate-500 transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-slate-400 peer-placeholder-shown:text-sm peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600">Business Name (Optional)</label>
                </div>

                <!-- Source Dropdown -->
                <div class="relative">
                    <select x-model="form.source" class="w-full border border-slate-300 rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 bg-white text-slate-700 text-sm appearance-none">
                        <option value="">Where did you find us?</option>
                        <option value="Google">Google Search</option>
                        <option value="Social">Social Media (FB/Insta)</option>
                        <option value="Friend">Friend / Referral</option>
                        <option value="Other">Other</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500"><svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>
                </div>
            </div>

            <!-- Email -->
            <div class="relative">
                <input type="email" id="email" x-model="form.email" class="peer w-full border border-slate-300 rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-transparent transition bg-transparent" placeholder="Email" required>
                <label for="email" class="absolute left-4 top-[-0.5rem] bg-white px-1 text-xs text-slate-500 transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-slate-400 peer-placeholder-shown:text-sm peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600">Email Address <span class="text-red-500">*</span></label>
            </div>

            <!-- Password with Eye Toggle -->
            <div class="relative" x-data="{ showPass: false }">
                <input :type="showPass ? 'text' : 'password'" id="pass" x-model="form.password" class="peer w-full border border-slate-300 rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-transparent transition bg-transparent pr-12" placeholder="Password" required>
                <label for="pass" class="absolute left-4 top-[-0.5rem] bg-white px-1 text-xs text-slate-500 transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-slate-400 peer-placeholder-shown:text-sm peer-focus:-top-2 peer-focus:text-xs peer-focus:text-blue-600">Password <span class="text-red-500">*</span></label>
                
                <!-- Eye Icon -->
                <button type="button" @click="showPass = !showPass" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 hover:text-slate-600 outline-none">
                    <svg x-show="!showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    <svg x-show="showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                </button>
            </div>

            <!-- Action Button -->
            <button type="submit" :disabled="loading" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 hover:shadow-lg hover:shadow-slate-900/20 transition-all transform active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center gap-3">
                <span x-show="loading" class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
                <span x-text="isLogin ? 'Access Dashboard' : 'Create Account'"></span>
                <svg x-show="!loading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <p class="mt-8 text-center text-xs text-slate-400">
            Protected by reCAPTCHA and subject to the Google <a href="#" class="underline hover:text-slate-600">Privacy Policy</a> and <a href="#" class="underline hover:text-slate-600">Terms of Service</a>.
        </p>
    </div>

    <script>
        function authApp() {
            return {
                isLogin: true, loading: false, errorMsg: '',
                form: { name: '', business: '', source: '', email: '', password: '' },
                userIp: '',

                async init() {
                    try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); this.userIp = d.ip; } catch(e){}
                    if(new URLSearchParams(window.location.search).get('mode')==='signup') this.isLogin=false;
                },

                async handleSubmit() {
                    this.loading=true; this.errorMsg='';
                    try {
                        if (this.isLogin) {
                            await auth.signInWithEmailAndPassword(this.form.email, this.form.password);
                            if(this.form.email === 'admin@huntai.com') window.location.href = 'admin.html';
                            else window.location.href = 'dashboard.html';
                        } else {
                            if(!this.form.name || !this.form.source) throw new Error("Full Name and Source are required.");
                            if(this.form.password.length < 6) throw new Error("Password must be at least 6 characters.");

                            if(this.userIp) {
                                const check = await db.collection('users').where('ip','==',this.userIp).get();
                                if(!check.empty) throw new Error("Account Limit Reached: You already have an account.");
                            }

                            const uc = await auth.createUserWithEmailAndPassword(this.form.email, this.form.password);
                            await db.collection('users').doc(uc.user.uid).set({
                                email: this.form.email,
                                name: this.form.name,
                                business: this.form.business || 'Individual',
                                source: this.form.source,
                                ip: this.userIp,
                                credits: 10,
                                role: 'user',
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            alert("Welcome! 10 Free Credits Added.");
                            window.location.href = 'dashboard.html';
                        }
                    } catch (err) {
                        if(err.code === 'auth/invalid-login-credentials' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') this.errorMsg = "Incorrect Email or Password.";
                        else if(err.code === 'auth/email-already-in-use') this.errorMsg = "Email already registered. Try logging in.";
                        else this.errorMsg = err.message.replace("Firebase: ", "");
                    } finally { this.loading=false; }
                }
            }
        }
    </script>
</body>
</html>
